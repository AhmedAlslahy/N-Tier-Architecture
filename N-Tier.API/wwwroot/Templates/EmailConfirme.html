<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Your Email</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; color: #333; background-color: #f9f9f9;">

    <div style="max-width: 500px; margin: auto; background: #ffffff; padding: 20px; border-radius: 8px; text-align: center;">

        <h2 style="color: #2e7d32;">Confirm Your Email Address</h2>

        <p style="font-size: 16px;">Hello, {{Name}}</p>

        <p style="font-size: 16px;">
            Please use the following code to confirm your email address:
        </p>

        <div style="
            font-size: 28px;
            font-weight: bold;
            margin: 20px auto;
            padding: 15px;
            background-color: #f2f2f2;
            display: inline-block;
            letter-spacing: 6px;
            border-radius: 6px;
        ">
            {{OTP}}
        </div>

        <p style="font-size: 14px; color: #888;">
            This code will expire in 5 minutes.
        </p>

        <hr style="margin: 20px 0; border: none; border-top: 1px solid #eee;">

        <p style="font-size: 13px; color: #999;">
            If you did not request this, please ignore this email.
        </p>

    </div>

</body>
</html>
